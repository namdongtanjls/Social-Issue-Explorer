<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Vocabulary Practice</title>

<style>

body{
font-family:Arial;
background:#f5f6fa;
padding:20px;
margin:0;
}

h2{
margin-top:0;
}

.top{
margin-bottom:20px;
display:flex;
gap:10px;
}

button{
padding:8px 12px;
border-radius:10px;
border:1px solid #d9d9d9;
background:white;
cursor:pointer;
}

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:14px;
}

.card{
background:white;
padding:16px;
border-radius:16px;
display:flex;
justify-content:space-between;
align-items:center;
border:1px solid #e3e3e3;
}

.left{
display:flex;
gap:10px;
}

.num{
color:#666;
font-size:14px;
}

.word{
font-size:18px;
font-weight:bold;
}

.meaning{
margin-top:4px;
color:#555;
font-size:14px;
}

.speak-btn{
font-size:18px;
border-radius:10px;
width:46px;
height:36px;
}

</style>
</head>

<body>

<h2>Chapter 2 Unit 3</h2>

<div class="top">
<button onclick="toggleMeaning()">뜻 숨기기</button>
<button onclick="toggleWord()">영어 숨기기</button>
</div>

<div class="grid" id="grid"></div>

<script>

const vocabList = [

["productive","생산적인"],
["mindlessly","함부로"],
["interest","관심, 흥미"],
["require","요구하다, 필요로 하다"],
["suitable","적합한"],
["journal","일기를 쓰다"],
["improve","개선되다"],
["hobby","취미"],
["limited","제한된"],
["focus","집중하다"],
["effectively","효과적으로"],
["audiobook","오디오 북"],
["average","평균의"],
["wasted","헛된"],
["scroll","스크롤하다"],
["discuss","상의하다, 논의하다"],
["inspire","격려하다, 영감을 주다"],
["publish","출판하다 "],
["suggest","제안하다"],
["pass","지나가다, 통과하다 "],
["similar","유사한, 비슷한"],
["social media","소셜 미디어 "],
["spend","쓰다, 보내다"],
["sing along","노래를 따라 부르다"],
["seriously","진지하게"]

];

const grid = document.getElementById("grid");

vocabList.forEach((v,i)=>{

grid.innerHTML += `
<div class="card">

<div class="left">

<div class="num">${i+1}.</div>

<div>
<div class="word">${v[0]}</div>
<div class="meaning">${v[1]}</div>
</div>

</div>

<button class="speak-btn" onclick="speak('${v[0]}')">🔊</button>

</div>
`;

});

let meaningHidden=false
let wordHidden=false

function speak(word){

let u=new SpeechSynthesisUtterance(word)

u.lang='en-US'

speechSynthesis.speak(u)

}

function toggleMeaning(){

meaningHidden=!meaningHidden

document.querySelectorAll(".meaning").forEach(e=>{
e.style.display=meaningHidden?"none":"block"
})

}

function toggleWord(){

wordHidden=!wordHidden

document.querySelectorAll(".word").forEach(e=>{
e.style.visibility=wordHidden?"hidden":"visible"
})

}

</script>

</body>
</html>
